<svg viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="f2t f2d">
<title id="f2t">Runtime authentication flow with certificate credentials</title>
<desc id="f2d">The vendor signs a JWT assertion with its private key, exchanges it at the Entra token endpoint for an access token, and calls the MCP server, which validates audience and roles.</desc>
<style>
  .th{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;font-weight:600;font-size:14px}
  .ts{font-family:ui-monospace,"Cascadia Code",Consolas,monospace;font-size:11.5px}
  .lbl{font-family:ui-monospace,"Cascadia Code",Consolas,monospace;font-size:11.5px;fill:#5F5E5A}
</style>
<defs><marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="340" rx="12" fill="#FFFFFF"/>
<rect x="40" y="40" width="200" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text class="th" x="140" y="62" text-anchor="middle" fill="#085041">Vendor client</text>
<text class="ts" x="140" y="82" text-anchor="middle" fill="#0F6E56">signs JWT with private key</text>
<text class="lbl" x="330" y="56" text-anchor="middle">signed assertion</text>
<line x1="240" y1="68" x2="416" y2="68" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#a2)"/>
<rect x="420" y="40" width="220" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text class="th" x="530" y="62" text-anchor="middle" fill="#3C3489">Entra ID token endpoint</text>
<text class="ts" x="530" y="82" text-anchor="middle" fill="#534AB7">verifies against public cert</text>
<line x1="530" y1="96" x2="530" y2="138" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#a2)"/>
<rect x="420" y="142" width="220" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text class="th" x="530" y="169" text-anchor="middle" fill="#3C3489">Access token issued</text>
<path d="M420 164 L140 164 L140 216" fill="none" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#a2)"/>
<rect x="40" y="220" width="200" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text class="th" x="140" y="242" text-anchor="middle" fill="#712B13">MCP server API</text>
<text class="ts" x="140" y="262" text-anchor="middle" fill="#993C1D">validates audience, roles</text>
<text class="lbl" x="330" y="236" text-anchor="middle">bearer token</text>
<line x1="420" y1="248" x2="244" y2="248" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#a2)"/>
<rect x="420" y="220" width="220" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text class="th" x="530" y="242" text-anchor="middle" fill="#444441">Vendor calls MCP server</text>
<text class="ts" x="530" y="262" text-anchor="middle" fill="#5F5E5A">token in Authorization header</text>
</svg>
