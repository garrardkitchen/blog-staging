<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">MCP development feedback loop</title>
  <desc id="desc">A six-stage loop from discover to inspect, invoke, trace, test and automate, with evidence accumulating in the centre.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#312e81" flood-opacity=".18"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#6366f1"/>
    </marker>
  </defs>
  <rect width="1200" height="520" rx="30" fill="url(#bg)"/>
  <text x="60" y="62" fill="#0f172a" font-family="Inter,Segoe UI,sans-serif" font-size="29" font-weight="750">From curiosity to repeatable evidence</text>
  <text x="60" y="92" fill="#475569" font-family="Inter,Segoe UI,sans-serif" font-size="16">MCP Explorer X compresses the developer feedback loop without hiding the protocol</text>

  <path d="M196 214C297 113 448 111 538 187" fill="none" stroke="#6366f1" stroke-width="5" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <path d="M654 187C748 113 900 126 984 219" fill="none" stroke="#6366f1" stroke-width="5" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <path d="M1000 313C917 418 757 421 660 349" fill="none" stroke="#6366f1" stroke-width="5" stroke-dasharray="8 8" marker-end="url(#arrow)"/>
  <path d="M534 349C442 425 282 414 198 318" fill="none" stroke="#6366f1" stroke-width="5" stroke-dasharray="8 8" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="62" y="167" width="190" height="126" rx="24" fill="#0284c7"/>
    <circle cx="102" cy="207" r="22" fill="#e0f2fe"/>
    <path d="M91 207h22M102 196v22" stroke="#0284c7" stroke-width="5" stroke-linecap="round"/>
    <text x="132" y="207" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="21" font-weight="700">Discover</text>
    <text x="84" y="248" fill="#e0f2fe" font-family="Inter,Segoe UI,sans-serif" font-size="14">connections · capabilities</text>
    <text x="84" y="272" fill="#bae6fd" font-family="Inter,Segoe UI,sans-serif" font-size="13">health and negotiation</text>

    <rect x="306" y="117" width="190" height="126" rx="24" fill="#7c3aed"/>
    <circle cx="346" cy="157" r="22" fill="#ede9fe"/>
    <path d="M335 151h22M335 161h16M335 171h20" stroke="#7c3aed" stroke-width="4" stroke-linecap="round"/>
    <text x="376" y="157" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="21" font-weight="700">Inspect</text>
    <text x="328" y="198" fill="#ede9fe" font-family="Inter,Segoe UI,sans-serif" font-size="14">schema · prompts · URIs</text>
    <text x="328" y="222" fill="#ddd6fe" font-family="Inter,Segoe UI,sans-serif" font-size="13">generated documentation</text>

    <rect x="526" y="119" width="190" height="126" rx="24" fill="#db2777"/>
    <circle cx="566" cy="159" r="22" fill="#fce7f3"/>
    <path d="M558 147l18 12-18 12z" fill="#db2777"/>
    <text x="596" y="159" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="21" font-weight="700">Invoke</text>
    <text x="548" y="200" fill="#fce7f3" font-family="Inter,Segoe UI,sans-serif" font-size="14">forms · templates · chat</text>
    <text x="548" y="224" fill="#fbcfe8" font-family="Inter,Segoe UI,sans-serif" font-size="13">valid and invalid cases</text>

    <rect x="746" y="151" width="190" height="126" rx="24" fill="#ea580c"/>
    <circle cx="786" cy="191" r="22" fill="#ffedd5"/>
    <path d="M775 191h22M786 180v22" stroke="#ea580c" stroke-width="4" stroke-linecap="round"/>
    <text x="816" y="191" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="21" font-weight="700">Trace</text>
    <text x="768" y="232" fill="#ffedd5" font-family="Inter,Segoe UI,sans-serif" font-size="14">inputs · outputs · tokens</text>
    <text x="768" y="256" fill="#fed7aa" font-family="Inter,Segoe UI,sans-serif" font-size="13">history and audit trail</text>

    <rect x="938" y="245" width="190" height="126" rx="24" fill="#059669"/>
    <circle cx="978" cy="285" r="22" fill="#d1fae5"/>
    <path d="M968 285l7 7 14-16" fill="none" stroke="#059669" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1008" y="285" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="21" font-weight="700">Test</text>
    <text x="960" y="326" fill="#d1fae5" font-family="Inter,Segoe UI,sans-serif" font-size="14">workflow · load · security</text>
    <text x="960" y="350" fill="#a7f3d0" font-family="Inter,Segoe UI,sans-serif" font-size="13">assertions and boundaries</text>

    <rect x="652" y="327" width="230" height="126" rx="24" fill="#0f766e"/>
    <circle cx="692" cy="367" r="22" fill="#ccfbf1"/>
    <path d="M680 367h24M698 359l8 8-8 8" fill="none" stroke="#0f766e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="722" y="367" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="21" font-weight="700">Automate</text>
    <text x="674" y="408" fill="#ccfbf1" font-family="Inter,Segoe UI,sans-serif" font-size="14">YAML · CLI · CI gates</text>
    <text x="674" y="432" fill="#99f6e4" font-family="Inter,Segoe UI,sans-serif" font-size="13">repeat on every change</text>
  </g>

  <g>
    <circle cx="486" cy="339" r="83" fill="#fff" stroke="#c7d2fe" stroke-width="3"/>
    <circle cx="486" cy="339" r="64" fill="#eef2ff"/>
    <path d="M459 342l17 17 38-44" fill="none" stroke="#4f46e5" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="486" y="390" text-anchor="middle" fill="#312e81" font-family="Inter,Segoe UI,sans-serif" font-size="15" font-weight="700">EVIDENCE</text>
  </g>
</svg>
