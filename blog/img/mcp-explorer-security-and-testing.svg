<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">Layered MCP security and testing strategy</title>
  <desc id="desc">A colourful layered pyramid shows supply chain, container, protocol, contracts, agent behaviour, human control and data protection, with continuous evidence on the side.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#08111f"/>
      <stop offset="1" stop-color="#15133b"/>
    </linearGradient>
    <linearGradient id="evidence" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="9" stdDeviation="12" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="1200" height="660" rx="32" fill="url(#bg)"/>
  <circle cx="1060" cy="90" r="190" fill="#7c3aed" opacity=".1"/>
  <text x="58" y="63" fill="#f8fafc" font-family="Inter,Segoe UI,sans-serif" font-size="29" font-weight="750">Confidence is layered — not a single green check</text>
  <text x="58" y="95" fill="#c4b5fd" font-family="Inter,Segoe UI,sans-serif" font-size="16">Test from immutable software supply to the human decision at the point of action</text>

  <g filter="url(#shadow)">
    <path d="M130 563H815L765 493H180z" fill="#1d4ed8"/>
    <path d="M180 485H765L715 415H230z" fill="#0284c7"/>
    <path d="M230 407H715L665 337H280z" fill="#0891b2"/>
    <path d="M280 329H665L615 259H330z" fill="#059669"/>
    <path d="M330 251H615L565 181H380z" fill="#65a30d"/>
    <path d="M380 173H565L472 116z" fill="#ca8a04"/>
  </g>

  <text x="472" y="148" text-anchor="middle" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="17" font-weight="700">Human control</text>
  <text x="472" y="211" text-anchor="middle" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="18" font-weight="700">Agent behaviour</text>
  <text x="472" y="289" text-anchor="middle" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="18" font-weight="700">Tool + resource contracts</text>
  <text x="472" y="367" text-anchor="middle" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="18" font-weight="700">MCP protocol + identity</text>
  <text x="472" y="445" text-anchor="middle" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="18" font-weight="700">Container + persistence</text>
  <text x="472" y="523" text-anchor="middle" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="18" font-weight="700">Supply chain + dependencies</text>

  <g font-family="Inter,Segoe UI,sans-serif">
    <rect x="862" y="134" width="278" height="429" rx="26" fill="#111827" stroke="#475569" stroke-width="2"/>
    <rect x="884" y="158" width="6" height="379" rx="3" fill="url(#evidence)"/>
    <text x="916" y="185" fill="#67e8f9" font-size="19" font-weight="700">Continuous evidence</text>

    <circle cx="916" cy="231" r="8" fill="#22d3ee"/>
    <text x="940" y="237" fill="#e2e8f0" font-size="15">HTTP health + API info</text>
    <text x="940" y="258" fill="#94a3b8" font-size="13">startup logs · dataPath</text>

    <circle cx="916" cy="302" r="8" fill="#38bdf8"/>
    <text x="940" y="308" fill="#e2e8f0" font-size="15">Valid + invalid contracts</text>
    <text x="940" y="329" fill="#94a3b8" font-size="13">boundaries · timeouts · retry</text>

    <circle cx="916" cy="373" r="8" fill="#818cf8"/>
    <text x="940" y="379" fill="#e2e8f0" font-size="15">Trace + audit review</text>
    <text x="940" y="400" fill="#94a3b8" font-size="13">tool calls · tokens · elicitations</text>

    <circle cx="916" cy="444" r="8" fill="#a78bfa"/>
    <text x="940" y="450" fill="#e2e8f0" font-size="15">Synthetic secret canaries</text>
    <text x="940" y="471" fill="#94a3b8" font-size="13">UI · history · exports · logs</text>

    <circle cx="916" cy="515" r="8" fill="#c084fc"/>
    <text x="940" y="521" fill="#e2e8f0" font-size="15">CI regression gates</text>
    <text x="940" y="542" fill="#94a3b8" font-size="13">YAML assertions · schema diff</text>
  </g>

  <g transform="translate(67 595)">
    <rect width="1073" height="38" rx="19" fill="#312e81"/>
    <text x="536" y="25" text-anchor="middle" fill="#e0e7ff" font-family="Inter,Segoe UI,sans-serif" font-size="15" font-weight="650">Observe → assert → automate → repeat after every server, model, policy, or dependency change</text>
  </g>
</svg>
