<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">MCP Explorer X architecture</title>
  <desc id="desc">A browser connects through a YARP gateway to an ASP.NET Core API, which talks to MCP servers, LLM providers, Azure services, Dev Tunnels and persistent storage.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071426"/>
      <stop offset="0.55" stop-color="#15103f"/>
      <stop offset="1" stop-color="#062f35"/>
    </linearGradient>
    <linearGradient id="browser" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="api" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="mcp" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#10b981"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#020617" flood-opacity=".45"/>
    </filter>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#67e8f9"/>
    </marker>
    <marker id="arrow-pink" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#f9a8d4"/>
    </marker>
  </defs>
  <rect width="1200" height="680" rx="32" fill="url(#bg)"/>
  <circle cx="1080" cy="80" r="170" fill="#06b6d4" opacity=".08"/>
  <circle cx="170" cy="620" r="220" fill="#8b5cf6" opacity=".1"/>

  <text x="64" y="67" fill="#f8fafc" font-family="Inter,Segoe UI,sans-serif" font-size="30" font-weight="700">MCP Explorer X — one observable control plane</text>
  <text x="64" y="99" fill="#a5b4fc" font-family="Inter,Segoe UI,sans-serif" font-size="16">REST for control · SSE for live feedback · Streamable HTTP for MCP</text>

  <g filter="url(#shadow)">
    <rect x="64" y="248" width="190" height="150" rx="24" fill="url(#browser)"/>
    <rect x="84" y="270" width="150" height="92" rx="10" fill="#071426" opacity=".78"/>
    <circle cx="101" cy="285" r="5" fill="#fb7185"/>
    <circle cx="118" cy="285" r="5" fill="#facc15"/>
    <circle cx="135" cy="285" r="5" fill="#4ade80"/>
    <path d="M102 313h115M102 330h74M102 347h94" stroke="#bae6fd" stroke-width="7" stroke-linecap="round" opacity=".8"/>
    <text x="159" y="385" text-anchor="middle" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="18" font-weight="700">Vue 3 workbench</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="344" y="220" width="210" height="205" rx="26" fill="#172554" stroke="#60a5fa" stroke-width="2"/>
    <circle cx="449" cy="274" r="31" fill="#2563eb"/>
    <path d="M431 274h36M455 260l14 14-14 14" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="449" y="330" text-anchor="middle" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="22" font-weight="700">YARP gateway</text>
    <text x="449" y="360" text-anchor="middle" fill="#bfdbfe" font-family="Inter,Segoe UI,sans-serif" font-size="15">SPA · :8080 · /api proxy</text>
    <text x="449" y="388" text-anchor="middle" fill="#93c5fd" font-family="Inter,Segoe UI,sans-serif" font-size="14">same-origin boundary</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="644" y="202" width="230" height="242" rx="28" fill="url(#api)"/>
    <path d="M724 253h70l20 34-20 34h-70l-20-34z" fill="#fff" opacity=".18"/>
    <circle cx="759" cy="287" r="18" fill="none" stroke="#fff" stroke-width="6"/>
    <path d="M759 257v12M759 305v12M729 287h12M777 287h12" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
    <text x="759" y="363" text-anchor="middle" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="22" font-weight="700">ASP.NET Core API</text>
    <text x="759" y="393" text-anchor="middle" fill="#fce7f3" font-family="Inter,Segoe UI,sans-serif" font-size="15">orchestration · auth · audit</text>
    <text x="759" y="420" text-anchor="middle" fill="#fbcfe8" font-family="Inter,Segoe UI,sans-serif" font-size="14">tool calls · workflows · redaction</text>
  </g>

  <path d="M254 323H336" stroke="#67e8f9" stroke-width="5" marker-end="url(#arrow-cyan)"/>
  <text x="295" y="305" text-anchor="middle" fill="#a5f3fc" font-family="Inter,Segoe UI,sans-serif" font-size="13">REST + SSE</text>
  <path d="M554 323H636" stroke="#f9a8d4" stroke-width="5" marker-end="url(#arrow-pink)"/>
  <text x="595" y="305" text-anchor="middle" fill="#fbcfe8" font-family="Inter,Segoe UI,sans-serif" font-size="13">proxy</text>

  <g filter="url(#shadow)">
    <rect x="970" y="137" width="170" height="95" rx="20" fill="url(#mcp)"/>
    <text x="1055" y="175" text-anchor="middle" fill="#ecfeff" font-family="Inter,Segoe UI,sans-serif" font-size="18" font-weight="700">MCP servers</text>
    <text x="1055" y="201" text-anchor="middle" fill="#ccfbf1" font-family="Inter,Segoe UI,sans-serif" font-size="13">tools · prompts · resources</text>

    <rect x="970" y="255" width="170" height="82" rx="20" fill="#7c3aed"/>
    <text x="1055" y="289" text-anchor="middle" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="18" font-weight="700">LLM providers</text>
    <text x="1055" y="314" text-anchor="middle" fill="#ede9fe" font-family="Inter,Segoe UI,sans-serif" font-size="13">OpenAI · Azure · local</text>

    <rect x="970" y="360" width="170" height="82" rx="20" fill="#0369a1"/>
    <text x="1055" y="394" text-anchor="middle" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="18" font-weight="700">Azure</text>
    <text x="1055" y="419" text-anchor="middle" fill="#e0f2fe" font-family="Inter,Segoe UI,sans-serif" font-size="13">Entra · Key Vault · Graph</text>

    <rect x="970" y="465" width="170" height="82" rx="20" fill="#c2410c"/>
    <text x="1055" y="499" text-anchor="middle" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="18" font-weight="700">Dev Tunnels</text>
    <text x="1055" y="524" text-anchor="middle" fill="#ffedd5" font-family="Inter,Segoe UI,sans-serif" font-size="13">webhook capture + replay</text>
  </g>

  <path d="M874 279C922 248 925 189 963 184" fill="none" stroke="#67e8f9" stroke-width="4" marker-end="url(#arrow-cyan)"/>
  <path d="M874 307H963" fill="none" stroke="#c4b5fd" stroke-width="4" marker-end="url(#arrow-cyan)"/>
  <path d="M874 348C916 359 924 397 963 401" fill="none" stroke="#7dd3fc" stroke-width="4" marker-end="url(#arrow-cyan)"/>
  <path d="M842 444C884 505 918 506 963 506" fill="none" stroke="#fdba74" stroke-width="4" marker-end="url(#arrow-cyan)"/>

  <g filter="url(#shadow)">
    <rect x="355" y="520" width="510" height="105" rx="24" fill="#0f766e" stroke="#5eead4" stroke-width="2"/>
    <path d="M401 552h56v39h-56zM409 544h40v8h-40z" fill="#99f6e4" opacity=".9"/>
    <text x="486" y="562" fill="#fff" font-family="Inter,Segoe UI,sans-serif" font-size="20" font-weight="700">Persistent /data boundary</text>
    <text x="486" y="591" fill="#ccfbf1" font-family="Inter,Segoe UI,sans-serif" font-size="14">settings · histories · workflows · certificates · audit</text>
    <text x="486" y="613" fill="#99f6e4" font-family="Inter,Segoe UI,sans-serif" font-size="13">Mount once; replace containers safely</text>
  </g>
  <path d="M759 444V511" stroke="#5eead4" stroke-width="5" marker-end="url(#arrow-cyan)"/>
</svg>
