<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="f3t f3d">
<title id="f3t">Per-vendor client identities and MCP server resource topology</title>
<desc id="f3d">Each vendor has one client app registration with one certificate, granted different app roles across the ten MCP server registrations.</desc>
<style>
  .th{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;font-weight:600;font-size:14px}
  .ts{font-family:ui-monospace,"Cascadia Code",Consolas,monospace;font-size:11.5px}
  .lbl{font-family:ui-monospace,"Cascadia Code",Consolas,monospace;font-size:11.5px;fill:#5F5E5A}
</style>
<defs><marker id="a3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="360" rx="12" fill="#FFFFFF"/>
<rect x="60" y="40" width="240" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text class="th" x="180" y="62" text-anchor="middle" fill="#085041">ElevenLabs client app reg</text>
<text class="ts" x="180" y="82" text-anchor="middle" fill="#0F6E56">one certificate</text>
<rect x="380" y="40" width="240" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text class="th" x="500" y="62" text-anchor="middle" fill="#085041">Amelia client app reg</text>
<text class="ts" x="500" y="82" text-anchor="middle" fill="#0F6E56">one certificate</text>
<text class="lbl" x="180" y="132" text-anchor="middle">app roles on servers 1-6</text>
<line x1="180" y1="96" x2="180" y2="114" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#a3)"/>
<text class="lbl" x="500" y="132" text-anchor="middle">app roles on servers 4-10</text>
<line x1="500" y1="96" x2="500" y2="114" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#a3)"/>
<line x1="180" y1="140" x2="180" y2="158" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#a3)"/>
<line x1="500" y1="140" x2="500" y2="158" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#a3)"/>
<rect x="40" y="162" width="600" height="158" rx="16" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text class="th" x="340" y="190" text-anchor="middle" fill="#3C3489">10 MCP server app registrations</text>
<text class="ts" x="340" y="210" text-anchor="middle" fill="#534AB7">each exposes an API and its own app roles</text>
<rect x="70" y="232" width="125" height="44" rx="8" fill="#FFFFFF" stroke="#534AB7" stroke-width="0.8"/>
<text class="th" x="132" y="259" text-anchor="middle" fill="#3C3489">MCP 1-3</text>
<rect x="215" y="232" width="125" height="44" rx="8" fill="#FFFFFF" stroke="#534AB7" stroke-width="0.8"/>
<text class="th" x="277" y="259" text-anchor="middle" fill="#3C3489">MCP 4-6</text>
<rect x="360" y="232" width="125" height="44" rx="8" fill="#FFFFFF" stroke="#534AB7" stroke-width="0.8"/>
<text class="th" x="422" y="259" text-anchor="middle" fill="#3C3489">MCP 7-8</text>
<rect x="505" y="232" width="125" height="44" rx="8" fill="#FFFFFF" stroke="#534AB7" stroke-width="0.8"/>
<text class="th" x="567" y="259" text-anchor="middle" fill="#3C3489">MCP 9-10</text>
<text class="lbl" x="340" y="302" text-anchor="middle">one token per target server, scoped by audience claim</text>
</svg>
