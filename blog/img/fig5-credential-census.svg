<svg viewBox="0 0 680 330" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="f5t f5d">
<title id="f5t">Where certificates live in the design</title>
<desc id="f5d">Certificates exist only on the two vendor client app registrations. The ten MCP server resource registrations hold no credentials at all.</desc>
<style>
  .th{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;font-weight:600;font-size:14px}
  .ts{font-family:ui-monospace,"Cascadia Code",Consolas,monospace;font-size:11.5px}
  .lbl{font-family:ui-monospace,"Cascadia Code",Consolas,monospace;font-size:11.5px;fill:#5F5E5A}
</style>
<defs><marker id="a5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="330" rx="12" fill="#FFFFFF"/>
<rect x="40" y="40" width="600" height="110" rx="16" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text class="th" x="340" y="68" text-anchor="middle" fill="#085041">Client app registrations: authenticate</text>
<rect x="70" y="84" width="255" height="50" rx="8" fill="#FFFFFF" stroke="#0F6E56" stroke-width="0.8"/>
<text class="th" x="197" y="104" text-anchor="middle" fill="#085041">ElevenLabs client</text>
<text class="ts" x="197" y="123" text-anchor="middle" fill="#0F6E56">1 cert: public key uploaded</text>
<rect x="355" y="84" width="255" height="50" rx="8" fill="#FFFFFF" stroke="#0F6E56" stroke-width="0.8"/>
<text class="th" x="482" y="104" text-anchor="middle" fill="#085041">Amelia client</text>
<text class="ts" x="482" y="123" text-anchor="middle" fill="#0F6E56">1 cert: public key uploaded</text>
<text class="lbl" x="340" y="178" text-anchor="middle">tokens flow down; no credentials below this line</text>
<line x1="197" y1="150" x2="197" y2="198" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#a5)"/>
<line x1="482" y1="150" x2="482" y2="198" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#a5)"/>
<rect x="40" y="202" width="600" height="88" rx="16" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text class="th" x="340" y="230" text-anchor="middle" fill="#3C3489">10 MCP server app registrations: resources</text>
<text class="ts" x="340" y="252" text-anchor="middle" fill="#534AB7">expose API, app roles, validate tokens</text>
<text class="ts" x="340" y="272" text-anchor="middle" fill="#534AB7">0 certificates, 0 secrets</text>
</svg>
