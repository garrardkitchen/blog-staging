<svg viewBox="0 0 680 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="f1t f1d">
<title id="f1t">Certificate provisioning flow</title>
<desc id="f1d">The vendor generates a key pair and keeps the private key. Only the public certificate travels to the Entra admin, who uploads it to the app registration.</desc>
<style>
  .th{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;font-weight:600;font-size:14px}
  .ts{font-family:ui-monospace,"Cascadia Code",Consolas,monospace;font-size:11.5px}
  .lbl{font-family:ui-monospace,"Cascadia Code",Consolas,monospace;font-size:11.5px;fill:#5F5E5A}
</style>
<defs><marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="240" rx="12" fill="#FFFFFF"/>
<rect x="40" y="60" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text class="th" x="130" y="82" text-anchor="middle" fill="#085041">Vendor (ElevenLabs)</text>
<text class="ts" x="130" y="102" text-anchor="middle" fill="#0F6E56">generates key pair</text>
<rect x="40" y="160" width="180" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text class="th" x="130" y="187" text-anchor="middle" fill="#085041">private key stays here</text>
<line x1="130" y1="116" x2="130" y2="156" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#a1)"/>
<rect x="270" y="60" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text class="th" x="350" y="82" text-anchor="middle" fill="#3C3489">Your Entra admin</text>
<text class="ts" x="350" y="102" text-anchor="middle" fill="#534AB7">receives .cer only</text>
<rect x="480" y="60" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text class="th" x="560" y="82" text-anchor="middle" fill="#3C3489">App registration</text>
<text class="ts" x="560" y="102" text-anchor="middle" fill="#534AB7">stores public key</text>
<text class="lbl" x="245" y="76" text-anchor="middle">.cer</text>
<line x1="220" y1="88" x2="266" y2="88" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#a1)"/>
<text class="lbl" x="455" y="76" text-anchor="middle">upload</text>
<line x1="430" y1="88" x2="476" y2="88" stroke="#5F5E5A" stroke-width="1.2" marker-end="url(#a1)"/>
</svg>
